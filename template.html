<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reddit Post</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: flex-start;   /* card anchored to top */
      min-height: 100vh;
      font-family: 'IBM Plex Sans', sans-serif;
      padding: 24px 24px 40px;
    }

    .card {
      background: #1a1a1b;
      border: 1px solid #343536;
      border-radius: 12px;
      width: 100%;
      max-width: 560px;
      overflow: hidden;
      box-shadow:
        0 4px 6px rgba(0,0,0,0.4),
        0 12px 40px rgba(0,0,0,0.6),
        0 0 0 1px rgba(255,255,255,0.04);
    }

    /* ── Top bar ── */
    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px 8px;
      background: #1a1a1b;
      border-bottom: 1px solid #272729;
    }

    .subreddit-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff4500 0%, #ff6534 60%, #ff8717 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      letter-spacing: -0.5px;
    }

    .meta {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .subreddit-name {
      font-size: 11px;
      font-weight: 700;
      color: #d7dadc;
      letter-spacing: 0.2px;
    }

    .post-meta {
      font-size: 10px;
      color: #818384;
    }

    .post-meta span {
      color: #d7dadc;
      font-weight: 500;
    }

    /* ── Body ── */
    .card-body {
      padding: 14px 16px 16px;
    }

    #post-title {
      font-size: 17px;
      font-weight: 700;
      color: #d7dadc;
      line-height: 1.4;
      margin-bottom: 10px;
      letter-spacing: -0.2px;
    }

    .paragraphs-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .post-paragraph {
      font-size: 14px;
      line-height: 1.65;
      color: #9c9d9e;
      letter-spacing: 0.1px;

      /* Expansion animation */
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transform: translateY(4px);
      transition:
        max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1),
        opacity    0.35s ease,
        transform  0.35s ease;
    }

    .post-paragraph.visible {
      max-height: 600px;
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="subreddit-icon">r/</div>
      <div class="meta">
        <div class="subreddit-name">r/AskReddit</div>
        <div class="post-meta">Posted by <span>u/throwaway_94821</span> · 4 hours ago</div>
      </div>
    </div>

    <div class="card-body">
      <h1 id="post-title"></h1>
      <div class="paragraphs-container" id="paragraphs-container"></div>
    </div>
  </div>
</body>
</html>
